# SonarQube / SonarCloud configuration for provider-linear
# Run: sonar-scanner (or make scan.sonar)

sonar.projectKey=avodah-inc_provider-linear
sonar.organization=avodah-inc

sonar.projectName=provider-linear
sonar.projectVersion=1.0

# Source configuration
sonar.sources=.
sonar.sourceEncoding=UTF-8
sonar.language=go

# Go coverage report (generated by: go test -coverprofile=coverage.out ./...)
sonar.go.coverage.reportPaths=coverage.out

# Exclusions — generated code, test files, vendor, binaries
sonar.exclusions=\
  bin/**,\
  apis/generated/**,\
  vendor/**,\
  **/*_test.go,\
  **/testdata/**,\
  cluster/**,\
  docs/**,\
  examples/**,\
  package/**

# Test file inclusions for separate analysis
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Quality gate — fail on critical/high issues
sonar.qualitygate.wait=true
