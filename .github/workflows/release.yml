# Release workflow for provider-linear
# Runs after CI passes on main. Uses semantic-release to determine the next
# version from conventional commits, then builds and publishes the OCI image
# and Crossplane package to GHCR.
# All actions are SHA-pinned.
# CLI-3452
name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

env:
  GO_VERSION: "1.26"
  IMAGE_NAME: ghcr.io/starlightromero/provider-linear

jobs:
  # ---------------------------------------------------------------------------
  # Semantic Release — determine version and create tag
  # ---------------------------------------------------------------------------
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      new-release: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}
      tag: ${{ steps.release.outputs.new_release_git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Build and push multi-arch image to GHCR
  # ---------------------------------------------------------------------------
  build-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: semantic-release
    if: ${{ needs.semantic-release.outputs.new-release == 'true' }}
    outputs:
      version: ${{ needs.semantic-release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.semantic-release.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.semantic-release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.semantic-release.outputs.version }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.semantic-release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Build Crossplane package and attach to GitHub Release
  # ---------------------------------------------------------------------------
  package:
    name: Crossplane Package
    runs-on: ubuntu-latest
    needs: [semantic-release, build-push]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.semantic-release.outputs.tag }}

      - name: Install Crossplane CLI
        run: |
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" | sh
          sudo mv crossplane /usr/local/bin/

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull runtime image
        run: docker pull ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }}

      - name: Build Crossplane package
        run: |
          cd package
          crossplane xpkg build \
            --package-root=. \
            --embed-runtime-image=${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }} \
            -o ../provider-linear-v${{ needs.semantic-release.outputs.version }}.xpkg

      - name: Push Crossplane package to GHCR
        run: |
          crossplane xpkg push \
            ${{ env.IMAGE_NAME }}:v${{ needs.semantic-release.outputs.version }}-xpkg \
            -f provider-linear-v${{ needs.semantic-release.outputs.version }}.xpkg

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }}
          format: cyclonedx
          output: sbom.cdx.json

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ needs.semantic-release.outputs.version }}
          draft: false
          files: |
            provider-linear-v${{ needs.semantic-release.outputs.version }}.xpkg
            sbom.cdx.json
