# Release workflow for provider-linear
# Builds and publishes the OCI image + Crossplane package to GHCR on semver tag push.
# All actions are SHA-pinned.
# CLI-3452
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.26"
  IMAGE_NAME: ghcr.io/avodah-inc/provider-linear

jobs:
  # ---------------------------------------------------------------------------
  # Run tests before releasing
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: >-
          go test -race -count=1
          ./internal/validation/...
          ./internal/auth/...
          ./internal/immutable/...
          ./internal/reconciler/...
          ./config/externalname/...

  # ---------------------------------------------------------------------------
  # Build and push multi-arch image to GHCR
  # ---------------------------------------------------------------------------
  build-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.meta.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Build Crossplane package and create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Crossplane CLI
        run: |
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" | sh
          sudo mv crossplane /usr/local/bin/

      - name: Build Crossplane package
        run: |
          cd package
          crossplane xpkg build \
            --package-root=. \
            --embed-runtime-image=${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.version }} \
            -o ../provider-linear-${{ github.ref_name }}.xpkg

      - name: Push Crossplane package to GHCR
        run: |
          crossplane xpkg push \
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-xpkg \
            -f provider-linear-${{ github.ref_name }}.xpkg

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.version }}
          format: cyclonedx
          output: sbom.cdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            provider-linear-${{ github.ref_name }}.xpkg
            sbom.cdx.json
