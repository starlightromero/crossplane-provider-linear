---
# ProviderConfig using OAuth2 Client Credentials flow
apiVersion: linear.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: oauth2-client-credentials
spec:
  credentials:
    source: OAuth2ClientCredentials
    secretRef:
      namespace: crossplane-system
      name: linear-oauth2-client
      key: clientId
    scope: "read,write"
---
# The Secret containing OAuth2 client credentials
apiVersion: v1
kind: Secret
metadata:
  name: linear-oauth2-client
  namespace: crossplane-system
type: Opaque
stringData:
  clientId: your-client-id
  clientSecret: your-client-secret
