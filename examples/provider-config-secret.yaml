---
# ProviderConfig using a static Linear API token stored in a Kubernetes Secret
apiVersion: linear.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: default
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: linear-credentials
      key: token
---
# The Secret containing the Linear API token
apiVersion: v1
kind: Secret
metadata:
  name: linear-credentials
  namespace: crossplane-system
type: Opaque
stringData:
  token: lin_api_REPLACE_WITH_YOUR_TOKEN
