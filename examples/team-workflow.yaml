---
# Example TeamWorkflow managed resource
apiVersion: linear.crossplane.io/v1alpha1
kind: TeamWorkflow
metadata:
  name: eng-workflow
spec:
  forProvider:
    key: "ENG"
    branch:
      pattern: "feature/*"
      isRegex: false
    draft: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    start: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
    review: "c3d4e5f6-a7b8-9012-cdef-123456789012"
    mergeable: "d4e5f6a7-b8c9-0123-defa-234567890123"
    merge: "e5f6a7b8-c9d0-1234-efab-345678901234"
  providerConfigRef:
    name: default
